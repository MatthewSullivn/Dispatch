<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Mesh — Locus Payment Network</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: #0a0a0f;
      color: #c8c8d0;
      min-height: 100vh;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

    header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      padding-bottom: 20px;
      margin-bottom: 24px;
      border-bottom: 1px solid #1a1a2e;
    }
    header h1 { font-size: 22px; color: #00d4aa; font-weight: 500; }
    header .tag {
      font-size: 11px;
      color: #0a0a0f;
      background: #00d4aa;
      padding: 2px 8px;
      border-radius: 3px;
      font-weight: 600;
    }
    header .sub { font-size: 12px; color: #555; margin-left: auto; }

    /* Agent Network Visualization */
    .network {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 28px;
      padding: 24px 0;
    }
    .agent-card {
      background: #111118;
      border: 1px solid #1a1a2e;
      border-radius: 8px;
      padding: 16px 20px;
      min-width: 200px;
      text-align: center;
      position: relative;
    }
    .agent-card.active { border-color: #00d4aa33; box-shadow: 0 0 20px #00d4aa11; }
    .agent-card .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }
    .dot-orch { background: #ff6b6b; box-shadow: 0 0 6px #ff6b6b55; }
    .dot-res { background: #4ecdc4; box-shadow: 0 0 6px #4ecdc455; }
    .dot-wri { background: #ffe66d; box-shadow: 0 0 6px #ffe66d55; }
    .agent-card .name { font-size: 13px; font-weight: 600; color: #e0e0e0; }
    .agent-card .role { font-size: 11px; color: #666; margin-top: 4px; }
    .agent-card .bal { font-size: 13px; color: #00d4aa; margin-top: 8px; font-weight: 500; }
    .agent-card .wallet {
      font-size: 9px; color: #444; margin-top: 6px;
      word-break: break-all;
    }
    .agent-card .wallet a { color: #444; text-decoration: none; }
    .agent-card .wallet a:hover { color: #00d4aa; }
    .arrow {
      font-size: 20px;
      color: #333;
      padding: 0 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .arrow .label { font-size: 9px; color: #555; }
    .arrow.active { color: #00d4aa; }
    .arrow.active .label { color: #00d4aa; }

    /* Goal Input */
    .input-section { margin-bottom: 24px; }
    .goal-row {
      display: flex;
      gap: 10px;
    }
    .goal-row input {
      flex: 1;
      background: #111118;
      border: 1px solid #1a1a2e;
      border-radius: 6px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }
    .goal-row input:focus { border-color: #00d4aa44; }
    .goal-row input::placeholder { color: #444; }
    .goal-row button {
      background: #00d4aa;
      color: #0a0a0f;
      border: none;
      border-radius: 6px;
      padding: 12px 20px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    .goal-row button:hover { background: #00eebb; }
    .goal-row button:disabled { opacity: 0.4; cursor: not-allowed; }

    .budget-row {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      align-items: center;
    }
    .budget-row label { font-size: 11px; color: #555; }
    .budget-row input {
      width: 70px;
      background: #111118;
      border: 1px solid #1a1a2e;
      border-radius: 4px;
      padding: 5px 8px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 12px;
      outline: none;
    }

    /* Status Bar */
    .status-bar {
      display: flex;
      gap: 24px;
      padding: 10px 16px;
      background: #111118;
      border: 1px solid #1a1a2e;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 12px;
    }
    .stat { display: flex; gap: 6px; }
    .stat-label { color: #555; }
    .stat-val { color: #00d4aa; font-weight: 600; }
    .stat-val.warn { color: #ff6b6b; }

    /* Main Grid */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }

    .panel {
      background: #111118;
      border: 1px solid #1a1a2e;
      border-radius: 8px;
      overflow: hidden;
    }
    .panel-head {
      padding: 10px 16px;
      font-size: 11px;
      color: #00d4aa;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid #1a1a2e;
      font-weight: 600;
    }
    .panel-body {
      padding: 12px 16px;
      max-height: 420px;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.7;
    }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 2px; }
    .full { grid-column: 1 / -1; }

    /* Flow Log */
    .log-entry {
      padding: 3px 0;
      display: flex;
      gap: 8px;
      align-items: baseline;
    }
    .log-time { color: #333; font-size: 10px; min-width: 70px; }
    .log-agent {
      font-size: 11px;
      font-weight: 600;
      min-width: 100px;
    }
    .log-agent.orch { color: #ff6b6b; }
    .log-agent.res { color: #4ecdc4; }
    .log-agent.wri { color: #ffe66d; }
    .log-agent.mesh { color: #00d4aa; }
    .log-action { color: #888; }
    .log-detail { color: #aaa; }
    .log-payment { color: #00d4aa; font-weight: 600; }
    .log-error { color: #ff6b6b; }
    .log-api { color: #a78bfa; }

    /* Report */
    .report {
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.6;
      color: #c8c8d0;
    }

    .empty-state {
      color: #333;
      font-style: italic;
      padding: 20px 0;
      text-align: center;
    }

    /* Payment flow animation */
    @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
    .pulsing { animation: pulse 1.5s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>agent_mesh</h1>
      <span class="tag">LOCUS</span>
      <span class="sub">autonomous agent payments on Base</span>
    </header>

    <!-- Agent Network -->
    <div class="network">
      <div class="agent-card" id="card-orch">
        <div><span class="dot dot-orch"></span><span class="name">Orchestrator</span></div>
        <div class="role">plans &amp; pays</div>
        <div class="bal" id="bal-orch">—</div>
        <div class="wallet"><a id="link-orch" href="#" target="_blank"></a></div>
      </div>
      <div class="arrow" id="arrow1">
        <span>→</span>
        <span class="label">USDC</span>
      </div>
      <div class="agent-card" id="card-res">
        <div><span class="dot dot-res"></span><span class="name">Researcher</span></div>
        <div class="role">search &amp; scrape</div>
        <div class="bal" id="bal-res">—</div>
        <div class="wallet"><a id="link-res" href="#" target="_blank"></a></div>
      </div>
      <div class="arrow" id="arrow2">
        <span>→</span>
        <span class="label">USDC</span>
      </div>
      <div class="agent-card" id="card-wri">
        <div><span class="dot dot-wri"></span><span class="name">Writer</span></div>
        <div class="role">synthesize</div>
        <div class="bal" id="bal-wri">—</div>
        <div class="wallet"><a id="link-wri" href="#" target="_blank"></a></div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-section">
      <div class="goal-row">
        <input type="text" id="goalInput" placeholder="Give the mesh a goal..." />
        <button id="execBtn" onclick="run()">Run Mesh</button>
      </div>
      <div class="budget-row">
        <div><label>Budget</label> <input type="number" id="budgetIn" value="2" min="0.1" step="0.5" /> <label>USDC</label></div>
        <div><label>Max/task</label> <input type="number" id="taskIn" value="0.5" min="0.05" step="0.1" /> <label>USDC</label></div>
      </div>
    </div>

    <!-- Status -->
    <div class="status-bar">
      <div class="stat"><span class="stat-label">status</span> <span class="stat-val" id="st-status">idle</span></div>
      <div class="stat"><span class="stat-label">budget</span> <span class="stat-val" id="st-budget">—</span></div>
      <div class="stat"><span class="stat-label">spent</span> <span class="stat-val warn" id="st-spent">$0.00</span></div>
      <div class="stat"><span class="stat-label">tasks</span> <span class="stat-val" id="st-tasks">0</span></div>
      <div class="stat"><span class="stat-label">payments</span> <span class="stat-val" id="st-payments">0</span></div>
    </div>

    <!-- Panels -->
    <div class="grid">
      <div class="panel">
        <div class="panel-head">Payment Flow</div>
        <div class="panel-body" id="flowLog">
          <div class="empty-state">waiting for goal...</div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">Audit Trail</div>
        <div class="panel-body" id="auditLog">
          <div class="empty-state">no activity yet</div>
        </div>
      </div>
      <div class="panel full">
        <div class="panel-head">Report Output</div>
        <div class="panel-body">
          <div class="report" id="reportOut">
            <div class="empty-state">submit a goal to see results</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    async function loadBalances() {
      try {
        const r = await fetch('/api/balances');
        const d = await r.json();
        for (const [key, info] of Object.entries(d.balances)) {
          const bal = info?.usdc_balance ?? info?.data?.usdc_balance ?? '?';
          const addr = info?.wallet_address ?? info?.data?.wallet_address ?? '';
          const shortAddr = addr ? addr.slice(0, 6) + '...' + addr.slice(-4) : '';
          const map = { orchestrator: 'orch', researcher: 'res', writer: 'wri' };
          const id = map[key];
          if (id) {
            $(`bal-${id}`).textContent = `${parseFloat(bal).toFixed(2)} USDC`;
            const link = $(`link-${id}`);
            link.textContent = shortAddr;
            link.href = `https://basescan.org/address/${addr}`;
          }
        }
      } catch (e) { console.error(e); }
    }

    function agentClass(name) {
      if (!name) return 'mesh';
      const n = name.toLowerCase();
      if (n.includes('orch')) return 'orch';
      if (n.includes('res')) return 'res';
      if (n.includes('wri')) return 'wri';
      return 'mesh';
    }

    function addLog(container, agent, action, detail, isPayment, isError, isApi) {
      const el = container;
      if (el.querySelector('.empty-state')) el.innerHTML = '';
      const row = document.createElement('div');
      row.className = 'log-entry';
      const cls = agentClass(agent);
      let detailCls = 'log-detail';
      if (isPayment) detailCls = 'log-payment';
      if (isError) detailCls = 'log-error';
      if (isApi) detailCls = 'log-api';
      const time = new Date().toLocaleTimeString('en-US', { hour12: false });
      row.innerHTML = `<span class="log-time">${time}</span><span class="log-agent ${cls}">${agent || 'mesh'}</span><span class="log-action">${action}</span>${detail ? `<span class="${detailCls}">${detail}</span>` : ''}`;
      el.appendChild(row);
      el.scrollTop = el.scrollHeight;
    }

    async function run() {
      const goal = $('goalInput').value.trim();
      if (!goal) return;
      const budget = parseFloat($('budgetIn').value) || 2;
      const maxPerTask = parseFloat($('taskIn').value) || 0.5;

      $('execBtn').disabled = true;
      $('execBtn').textContent = 'Running...';
      $('st-status').textContent = 'executing';
      $('st-budget').textContent = `$${budget.toFixed(2)}`;
      $('st-spent').textContent = '$0.00';
      $('flowLog').innerHTML = '';
      $('auditLog').innerHTML = '';
      $('reportOut').innerHTML = '<div class="empty-state pulsing">agents working...</div>';

      addLog($('flowLog'), 'mesh', 'goal →', goal.slice(0, 60), false, false, false);

      // Animate arrows
      $('arrow1').classList.add('active');
      $('card-orch').classList.add('active');

      try {
        const r = await fetch('/api/goal', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ goal, budget, maxPerTask }),
        });
        const data = await r.json();

        $('arrow1').classList.remove('active');
        $('card-orch').classList.remove('active');

        if (data.success && data.audit) {
          // Collect all logs
          const logs = [];
          const addLogs = (trail) => {
            if (trail?.log) logs.push(...trail.log);
          };
          addLogs(data.audit.orchestrator);
          if (data.audit.workers) {
            Object.values(data.audit.workers).forEach(addLogs);
          }
          logs.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

          $('flowLog').innerHTML = '';
          $('auditLog').innerHTML = '';

          let paymentCount = 0;
          for (const entry of logs) {
            const agent = entry.agent || 'mesh';
            const action = entry.action;
            let detail = '';
            let isPay = false, isErr = false, isApi = false;

            if (action.includes('payment') && entry.amount) {
              detail = `${entry.amount} USDC`;
              isPay = true;
              if (action === 'payment_completed') paymentCount++;
            }
            if (action.includes('failed')) isErr = true;
            if (action === 'api_call') { detail = `${entry.provider}/${entry.endpoint}`; isApi = true; }
            if (entry.query) detail = entry.query.slice(0, 50);
            if (entry.task) detail = entry.task.slice(0, 50);
            if (entry.error && !detail) detail = entry.error.slice(0, 80);

            // Payment-related goes to flow, everything to audit
            if (action.includes('payment') || action.includes('budget') || action.includes('dispatch') || action.includes('goal') || action.includes('subtask')) {
              addLog($('flowLog'), agent, action, detail, isPay, isErr, isApi);
            }
            addLog($('auditLog'), agent, action, detail, isPay, isErr, isApi);
          }

          // Status
          const s = data.audit.summary;
          if (s) {
            $('st-spent').textContent = `$${(s.totalSpent || 0).toFixed(2)}`;
            $('st-tasks').textContent = s.completed || 0;
            $('st-payments').textContent = paymentCount;
          }

          // Report
          const report = data.report?.report || 'No report generated.';
          // Try to parse if it's JSON (from Grok)
          let displayReport = report;
          try {
            const parsed = JSON.parse(report);
            displayReport = parsed?.data?.choices?.[0]?.message?.content
              || parsed?.choices?.[0]?.message?.content
              || JSON.stringify(parsed, null, 2);
          } catch (e) {}
          $('reportOut').textContent = displayReport;

          $('st-status').textContent = 'completed';
        } else {
          addLog($('flowLog'), 'mesh', 'error', data.error || 'Unknown error', false, true, false);
          $('st-status').textContent = 'error';
          $('reportOut').textContent = data.error || 'Execution failed';
        }
      } catch (err) {
        addLog($('flowLog'), 'mesh', 'error', err.message, false, true, false);
        $('st-status').textContent = 'error';
        $('reportOut').textContent = err.message;
      }

      $('execBtn').disabled = false;
      $('execBtn').textContent = 'Run Mesh';
      loadBalances();
    }

    // Enter to submit
    $('goalInput').addEventListener('keydown', e => { if (e.key === 'Enter') run(); });

    loadBalances();
    setInterval(loadBalances, 30000);
  </script>
</body>
</html>
